name: AI 이슈 자동 응답

on:
  workflow_call:
    inputs:
      repository:
        description: "이슈가 속한 저장소 (예: org/repo)"
        required: true
        type: string
      issue_number:
        description: "이슈 번호"
        required: true
        type: number
      ai_provider:
        description: "AI 제공자 (anthropic/openai/local)"
        required: false
        default: "anthropic"
        type: string
      anthropic_model:
        description: "Anthropic 모델명"
        required: false
        default: "claude-sonnet-4-6"
        type: string
      openai_model:
        description: "OpenAI 모델명"
        required: false
        default: "gpt-4o"
        type: string
      local_model_url:
        description: "로컬 모델 엔드포인트"
        required: false
        default: ""
        type: string
      local_model_name:
        description: "로컬 모델명"
        required: false
        default: "llama3"
        type: string
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false

permissions:
  issues: write
  contents: read

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: 리뷰어 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          repository: mixedsider/github-ai-reviewer
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: AI 이슈 응답 실행
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ inputs.repository }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          AI_PROVIDER: ${{ inputs.ai_provider }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ inputs.anthropic_model }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ inputs.openai_model }}
          LOCAL_MODEL_URL: ${{ inputs.local_model_url }}
          LOCAL_MODEL_NAME: ${{ inputs.local_model_name }}
        run: python scripts/review.py issue

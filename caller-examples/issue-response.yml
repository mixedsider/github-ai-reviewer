# 이 파일을 Organization의 각 저장소에 복사하세요.
# 경로: .github/workflows/issue-response.yml
#
# 사전 조건:
#   - 리뷰어 저장소(your-username/github-ai-reviewer)가 GitHub에 public으로 공개되어 있어야 합니다.
#   - 이 저장소의 Settings → Secrets and variables → Actions에 API 키가 설정되어 있어야 합니다.

name: AI 이슈 자동 응답

on:
  issues:
    types: [opened]

jobs:
  respond:
    uses: your-username/github-ai-reviewer/.github/workflows/issue-response.yml@main
    with:
      repository: ${{ github.repository }}
      issue_number: ${{ github.event.issue.number }}
      ai_provider: "anthropic"        # anthropic / openai / local
      # anthropic_model: "claude-sonnet-4-6"  # Claude 모델 선택 (선택사항)
      # openai_model: "gpt-4o"        # OpenAI 사용 시 선택사항
      # local_model_url: "http://..."  # 로컬 모델 사용 시
      # local_model_name: "llama3"     # 로컬 모델 사용 시
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

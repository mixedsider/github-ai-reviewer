# 이 파일을 Organization의 각 저장소에 복사하세요.
# 경로: .github/workflows/pr-review.yml
#
# 사전 조건:
#   - 리뷰어 저장소(your-username/github-ai-reviewer)가 GitHub에 public으로 공개되어 있어야 합니다.
#   - 이 저장소의 Settings → Secrets and variables → Actions에 API 키가 설정되어 있어야 합니다.

name: AI PR 코드 리뷰

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    uses: mixedsider/github-ai-reviewer/.github/workflows/pr-review.yml@main
    with:
      repository: ${{ github.repository }}
      pr_number: ${{ github.event.pull_request.number }}
      ai_provider: "anthropic"        # anthropic / openai / local
      # anthropic_model: "claude-sonnet-4-6"  # Claude 모델 선택 (선택사항)
      # openai_model: "gpt-4o"        # OpenAI 사용 시 선택사항
      # local_model_url: "http://..."  # 로컬 모델 사용 시
      # local_model_name: "llama3"     # 로컬 모델 사용 시
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
